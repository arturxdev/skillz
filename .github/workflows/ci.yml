name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck API
        working-directory: packages/api
        run: bun run typecheck

      - name: Typecheck CLI
        working-directory: packages/cli
        run: bun run typecheck
